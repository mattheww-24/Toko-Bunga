<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Bloomify</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="../css/style.css?v=20260712">
    <link rel="stylesheet" href="../css/auth.css?v=20260712">

</head>

<body>

    <!-- LOADER -->

    <div class="loader" id="loader">

        <div class="loader-flower">🌸</div>

        <h1 class="loader-logo">Bloomify</h1>

        <p>Loading...</p>

        <div class="loader-bar">
            <div class="loader-progress"></div>
        </div>

    </div>

    <main class="auth">

        <!-- LEFT -->
        <section class="auth-left">

            <img src="../assets/images/hero/hero-flower.png"
                alt="Bloomify Hero"
                class="hero-image">

            <div class="hero-overlay">

                <h1 class="hero-logo">
                    Bloomify
                </h1>

                <p class="hero-text">
                    Crafting moments of natural elegance
                    through the language of flowers.
                </p>

            </div>

        </section>

        <!-- RIGHT -->
        <section class="auth-right">

            <div class="auth-card fade-up">

                <!-- Tabs -->

                <div class="auth-tabs">

                    <a href="login.html"
                        class="tab active">
                        Login
                    </a>

                    <a href="signup.html"
                        class="tab">
                        Sign Up
                    </a>

                </div>

                <!-- Title -->

                <h2 class="auth-title">
                    Welcome Back
                </h2>

                <p class="auth-subtitle">
                    Log in to your Bloomify account.
                </p>

                <!-- FORM -->

                <form id="loginForm">

                    <div class="input-group">

                        <label class="input-label">
                            Email
                        </label>

                        <input
                            type="email"
                            class="input"
                            id="email"
                            placeholder="Enter your email">

                    </div>

                    <div class="input-group">

                        <label class="input-label">
                            Password
                        </label>

                        <div class="password-wrapper">

                            <input
                                type="password"
                                class="input"
                                id="password"
                                placeholder="Enter your password">

                            <button
                                type="button"
                                id="togglePassword"
                                class="password-btn">

                                <i data-lucide="eye"></i>

                            </button>

                        </div>

                    </div>

                    <div class="auth-option">

                        <label class="remember">

                            <input
                                type="checkbox"
                                id="remember">

                            Remember me

                        </label>

                        <a href="#"
                            class="forgot">
                            Forgot Password?
                        </a>

                    </div>

                    <button
                        class="btn btn-primary login-btn"
                        type="submit">

                        LOGIN

                    </button>

                </form>

                <!-- Divider -->

                <div class="divider">

                    <span>
                        or continue with
                    </span>

                </div>

                <!-- Google -->

                <button class="google-btn">

                    <svg width="22"
                        height="22"
                        viewBox="0 0 48 48">

                        <path fill="#FFC107"
                            d="M43.611 20.083H42V20H24v8h11.303C33.655 32.657 29.205 36 24 36c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>

                        <path fill="#FF3D00"
                            d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>

                        <path fill="#4CAF50"
                            d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.141 35.091 26.715 36 24 36c-5.184 0-9.625-3.329-11.284-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>

                        <path fill="#1976D2"
                            d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.084 5.57l6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>

                    </svg>

                    Continue with Google

                </button>

                <!-- Bottom -->

                <p class="bottom-text">

                    Don't have an account?

                    <a href="signup.html">

                        Sign Up

                    </a>

                </p>

            </div>

        </section>

    </main>

    <!-- ==================================
     TOAST NOTIFICATION
================================== -->

    <div class="toast" id="toast">

        <div class="toast-icon">

            <i data-lucide="check-circle"></i>

        </div>

        <div class="toast-content">

            <h4 id="toastTitle">
                Success
            </h4>

            <p id="toastMessage">
                Login Success
            </p>

        </div>

    </div>

    <script>
        lucide.createIcons();
    </script>

    <script src="../js/main.js?v=20260712"></script>
    <script src="../js/auth.js?v=20260712"></script>

</body>

</html>
