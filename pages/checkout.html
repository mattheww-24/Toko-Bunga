<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Checkout | Bloomify</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600&family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet"
          href="../css/style.css?v=20260716">

    <link rel="stylesheet"
          href="../css/checkout.css?v=20260716">

</head>

<body>

    <header class="navbar">

        <div class="container">

            <a href="../index.html" class="logo">
                Bloomify
            </a>

            <a href="cart.html" class="back-link">
                ← Back to Cart
            </a>

        </div>

    </header>

    <section class="checkout">

        <div class="container checkout-grid" id="checkoutGrid">

            <form id="checkoutForm">

                <h1>Checkout</h1>

                <div class="input-group">

                    <label>Full Name</label>

                    <input type="text" id="fullname" class="input" placeholder="Enter your full name">

                </div>

                <div class="input-group">

                    <label>Phone Number</label>

                    <input type="tel" id="phone" class="input" placeholder="08xxxxxxxxxx">

                </div>

                <div class="input-group">

                    <label>Delivery Address</label>

                    <textarea id="address" class="input" rows="4" placeholder="Enter delivery address"></textarea>

                </div>

                <div class="input-group">

                    <label>Payment Method</label>

                    <select id="payment" class="input">

                        <option value="">Choose Payment</option>

                        <option>Cash On Delivery</option>

                        <option>Bank Transfer</option>

                        <option>E-Wallet</option>

                    </select>

                </div>

                <button class="btn btn-primary" type="submit" id="placeOrderBtn">
                    Place Order
                </button>

            </form>

            <aside class="checkout-summary">

                <h2>Order Summary</h2>

                <div id="checkoutSummaryList"></div>

                <div class="checkout-summary-row checkout-summary-total">
                    <span>Total</span>
                    <strong id="checkoutTotal">Rp0</strong>
                </div>

            </aside>

        </div>

        <div class="container">

            <div class="order-success" id="orderSuccess">

                <i data-lucide="check-circle"></i>

                <h2>Order Placed Successfully!</h2>

                <p>Makase so ba beli, torang smo sadia.</p>

                <a href="../index.html" class="btn btn-primary">
                    Back to Home
                </a>

            </div>

        </div>

    </section>

    <footer class="footer">

        <div class="container">

            <p>© 2026 Bloomify. All rights reserved.</p>

        </div>

    </footer>

    <div class="toast" id="toast">

        <div class="toast-icon">
            <i data-lucide="check-circle"></i>
        </div>

        <div class="toast-content">
            <h4 id="toastTitle">Success</h4>
            <p id="toastMessage">Order Success</p>
        </div>

    </div>

    <script>
        try { lucide.createIcons(); } catch (err) {}
    </script>

    <script src="../js/products-data.js?v=20260716"></script>

    <script src="../js/cart-store.js?v=20260716"></script>

    <script src="../js/main.js?v=20260716"></script>

    <script src="../js/checkout.js?v=20260716"></script>

</body>

</html>
